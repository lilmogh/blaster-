<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asteroid Neo-Blaster</title>
    <style>
        body {
            margin: 0;
            padding: 20px 0;
            box-sizing: border-box;
            background: #0a0a16;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: auto;
        }
        h1 { margin-bottom: 5px; color: #00ffcc; text-shadow: 0 0 10px #00ffcc; }
        #controls { margin-bottom: 15px; }
        button {
            background: #00ffcc; border: none; padding: 10px 20px;
            font-family: inherit; font-weight: bold; cursor: pointer;
            border-radius: 4px; box-shadow: 0 0 15px #00ffcc;
            transition: all 0.2s;
        }
        button:hover { background: #fff; box-shadow: 0 0 25px #fff; }
        canvas {
            background: #020208;
            border: 3px solid #334;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.1);
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <h1>NEO-BLASTER</h1>
    <div id="controls">
        <button id="connectBtn">CONNECT JOYSTICK</button>
    </div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Game States: 'START', 'PLAYING', 'GAMEOVER'
let gameState = 'START';
let score = 0;
let lives = 3;

// Entities
let player = { x: 400, y: 500, size: 20, speed: 6 };
let lasers = [];
let asteroids = [];
let particles = [];
let stars = [];

// Joystick input tracking
let joyX = 512, joyY = 512, buttonPressed = 1;
let lastButtonState = 1; 
let shootCooldown = 0;
let heat = 0;
const MAX_HEAT = 600; // 10s at 60fps
let overheated = false;
let overheatTimer = 0;
const OVERHEAT_DURATION = 240; // 4s at 60fps

// Generate ambient background stars
for(let i=0; i<100; i++) {
    stars.push({
        x: Math.random() * canvas.width, 
        y: Math.random() * canvas.height, 
        size: Math.random() * 1.5 + 0.5, 
        speed: Math.random() * 2 + 0.2,
        color: Math.random() > 0.5 ? '#ffffff' : (Math.random() > 0.5 ? '#add8e6' : '#ffebcd')
    });
}

// --- WEB SERIAL CONNECTION ---
document.getElementById('connectBtn').addEventListener('click', async () => {
    try {
        const port = await navigator.serial.requestPort();
        await port.open({ baudRate: 115200 });
        document.getElementById('connectBtn').innerText = "CONNECTED";
        document.getElementById('connectBtn').style.background = "#2ed573";
        document.getElementById('connectBtn').style.boxShadow = "0 0 15px #2ed573";
        
        if (gameState === 'START') gameState = 'PLAYING';

        const textDecoder = new TextDecoderStream();
        port.readable.pipeTo(textDecoder.writable);
        const reader = textDecoder.readable.getReader();

        let buffer = '';
        while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            buffer += value;
            let lines = buffer.split('\n');
            buffer = lines.pop(); 
            
            if (lines.length > 0) {
                let latestData = lines[lines.length - 1].trim().split(',');
                if (latestData.length === 3) {
                    joyX = parseInt(latestData[0]);
                    joyY = parseInt(latestData[1]);
                    buttonPressed = parseInt(latestData[2]);
                }
            }
        }
    } catch (err) {
        console.error(err);
        alert("Connection failed. Check if Serial Monitor is closed!");
    }
});

// --- GAME MECHANICS ---
function spawnAsteroid() {
    if (Math.random() < 0.03 && asteroids.length < 12) { 
        let radius = Math.random() * 25 + 15;
        let points = [];
        let numPoints = Math.floor(Math.random() * 5) + 7;
        for (let i = 0; i < numPoints; i++) {
            points.push((Math.random() - 0.5) * (radius * 0.4));
        }
        asteroids.push({
            x: Math.random() * canvas.width,
            y: -30,
            radius: radius,
            speed: Math.random() * 3 + 2,
            hp: 2,
            points: points,
            angle: Math.random() * Math.PI * 2,
            rotSpeed: (Math.random() - 0.5) * 0.05
        });
    }
}

function createExplosion(x, y, color) {
    for(let i=0; i<25; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random() - 0.5) * 8,
            vy: (Math.random() - 0.5) * 8,
            size: Math.random() * 3 + 2,
            alpha: 1,
            color: color
        });
    }
}

function resetGame() {
    player.x = 400; player.y = 500;
    lasers = []; asteroids = []; particles = [];
    score = 0; lives = 3;
    heat = 0; overheated = false; overheatTimer = 0;
    gameState = 'PLAYING';
}

// --- MAIN LOOP ---
function update() {
    // 1. Background Stars
    stars.forEach(star => {
        star.y += star.speed;
        if(star.y > canvas.height) star.y = 0;
    });

    if (gameState !== 'PLAYING') return;

    // 2. Player Movement via Joystick (with 100-point deadzone)
    if (joyX < 412) player.x -= player.speed * ((412 - joyX) / 412);
    if (joyX > 612) player.x += player.speed * ((joyX - 612) / 412);
    if (joyY < 412) player.y -= player.speed * ((412 - joyY) / 412);
    if (joyY > 612) player.y += player.speed * ((joyY - 612) / 412);

    // Keep inside boundaries
    player.x = Math.max(player.size, Math.min(canvas.width - player.size, player.x));
    player.y = Math.max(player.size, Math.min(canvas.height - player.size, player.y));

    // 3. Shooting Mechanics (Button pin reads 0 when clicked)
    if (shootCooldown > 0) shootCooldown--;
    
    if (overheated) {
        overheatTimer--;
        if (overheatTimer <= 0) {
            overheated = false;
            heat = 0;
        }
        if (Math.random() < 0.3) {
            particles.push({
                x: player.x + (Math.random() - 0.5) * 10,
                y: player.y,
                vx: (Math.random() - 0.5) * 2,
                vy: -Math.random() * 2 - 1,
                size: Math.random() * 4 + 2,
                alpha: 1,
                color: '#555555'
            });
        }
    } else {
        if (buttonPressed === 0) {
            heat += 1;
            if (heat >= MAX_HEAT) {
                overheated = true;
                overheatTimer = OVERHEAT_DURATION;
                for(let i=0; i<20; i++) {
                    particles.push({
                        x: player.x, y: player.y,
                        vx: (Math.random() - 0.5) * 4, vy: -Math.random() * 4,
                        size: Math.random() * 5 + 3, alpha: 1, color: '#888888'
                    });
                }
            } else if (shootCooldown === 0) {
                lasers.push({ x: player.x, y: player.y - player.size, speed: 9 });
                shootCooldown = 12;
            }
        } else {
            if (heat > 0) heat -= 2;
            if (heat < 0) heat = 0;
        }
    }

    // 4. Update Lasers
    lasers.forEach((laser, index) => {
        laser.y -= laser.speed;
        if (laser.y < 0) lasers.splice(index, 1);
    });

    // 5. Update Asteroids & Collision Detection
    spawnAsteroid();
    asteroids.forEach((ast, aIdx) => {
        ast.y += ast.speed;
        ast.angle += ast.rotSpeed;

        // Asteroid hits bottom boundary
        if (ast.y > canvas.height + 40) asteroids.splice(aIdx, 1);

        // Collision: Laser vs Asteroid
        lasers.forEach((laser, lIdx) => {
            let dist = Math.hypot(laser.x - ast.x, laser.y - ast.y);
            if (dist < ast.radius) {
                lasers.splice(lIdx, 1);
                ast.hp--;
                createExplosion(laser.x, laser.y, '#00ffcc');
                
                if (ast.hp <= 0) {
                    createExplosion(ast.x, ast.y, '#ff4757');
                    score += Math.floor(ast.radius);
                    asteroids.splice(aIdx, 1);
                }
            }
        });

        // Collision: Player vs Asteroid
        let distToPlayer = Math.hypot(player.x - ast.x, player.y - ast.y);
        if (distToPlayer < ast.radius + player.size) {
            createExplosion(player.x, player.y, '#ff1053');
            asteroids.splice(aIdx, 1);
            lives--;
            if (lives <= 0) gameState = 'GAMEOVER';
        }
    });

    // 6. Update Particles
    particles.forEach((p, index) => {
        p.x += p.vx; p.y += p.vy;
        p.alpha -= 0.03;
        p.size *= 0.95;
        if (p.alpha <= 0 || p.size <= 0.5) particles.splice(index, 1);
    });

    // Joystick click to restart game when dead
    if (gameState === 'GAMEOVER' && buttonPressed === 0 && lastButtonState === 1) {
        resetGame();
    }
    lastButtonState = buttonPressed;
}

function draw() {
    // Draw Background Gradient
    let bgGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
    bgGradient.addColorStop(0, '#020208');
    bgGradient.addColorStop(1, '#0a0a2a');
    ctx.fillStyle = bgGradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Draw Ambient Stars
    stars.forEach(star => {
        ctx.fillStyle = star.color;
        ctx.globalAlpha = star.size / 2;
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.size, 0, Math.PI*2);
        ctx.fill();
    });
    ctx.globalAlpha = 1.0;

    if (gameState === 'START') {
        ctx.fillStyle = '#00ffcc';
        ctx.font = '30px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText("WAITING FOR HARDWARE...", canvas.width/2, canvas.height/2);
        ctx.font = '16px "Courier New"';
        ctx.fillText("Click the button above to pair your Arduino", canvas.width/2, canvas.height/2 + 40);
        return;
    }

    // Draw Particles
    particles.forEach(p => {
        ctx.save();
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = p.color;
        ctx.shadowBlur = 10;
        ctx.shadowColor = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
    });

    // Draw Player Ship (Neon Triangle)
    ctx.save();
    ctx.translate(player.x, player.y);
    
    let shipColor = '#00ffcc';
    if (overheated && Math.floor(Date.now() / 150) % 2 === 0) {
        shipColor = '#ff4757';
    }
    
    ctx.strokeStyle = shipColor;
    ctx.lineWidth = 3;
    ctx.shadowBlur = 20; 
    ctx.shadowColor = shipColor;
    ctx.fillStyle = overheated ? 'rgba(255, 71, 87, 0.2)' : 'rgba(0, 255, 204, 0.2)';
    
    ctx.beginPath();
    ctx.moveTo(0, -player.size);
    ctx.lineTo(-player.size, player.size);
    ctx.lineTo(0, player.size - 5);
    ctx.lineTo(player.size, player.size);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Engine glow
    ctx.beginPath();
    ctx.moveTo(-player.size/2 + 2, player.size - 2);
    ctx.lineTo(0, player.size + Math.random() * 15 + 10);
    ctx.lineTo(player.size/2 - 2, player.size - 2);
    ctx.fillStyle = '#ff9900';
    ctx.shadowBlur = 15;
    ctx.shadowColor = '#ff9900';
    ctx.fill();
    ctx.restore();

    // Draw Lasers
    lasers.forEach(l => {
        ctx.save();
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#00ffcc';
        ctx.fillStyle = '#fff';
        ctx.fillRect(l.x - 2, l.y, 4, 15);
        ctx.fillStyle = '#00ffcc';
        ctx.fillRect(l.x - 4, l.y + 5, 8, 10);
        ctx.restore();
    });

    // Draw Asteroids
    ctx.strokeStyle = '#ff4757';
    ctx.lineWidth = 2;
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#ff4757';
    asteroids.forEach(ast => {
        ctx.save();
        ctx.translate(ast.x, ast.y);
        ctx.rotate(ast.angle);
        ctx.beginPath();
        for (let i = 0; i < ast.points.length; i++) {
            let angle = (i / ast.points.length) * Math.PI * 2;
            let r = ast.radius + ast.points[i];
            let x = Math.cos(angle) * r;
            let y = Math.sin(angle) * r;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.stroke();
        ctx.fillStyle = 'rgba(255, 71, 87, 0.1)';
        ctx.fill();
        ctx.restore();
    });
    ctx.shadowBlur = 0;

    // Draw Heads-Up-Display (HUD)
    ctx.fillStyle = '#fff';
    ctx.font = '20px "Courier New"';
    ctx.textAlign = 'left';
    ctx.fillText(`SCORE: ${score}`, 20, 40);
    ctx.textAlign = 'right';
    ctx.fillText(`LIVES: ${'❤️ '.repeat(lives)}`, canvas.width - 20, 40);

    // Draw Heat Bar
    ctx.textAlign = 'left';
    ctx.fillStyle = '#fff';
    ctx.fillText("HEAT:", 20, 70);
    ctx.strokeStyle = '#fff';
    ctx.strokeRect(80, 55, 150, 15);
    
    let heatRatio = overheated ? (overheatTimer / OVERHEAT_DURATION) : (heat / MAX_HEAT);
    
    if (overheated) {
        ctx.fillStyle = (Math.floor(Date.now() / 150) % 2 === 0) ? '#ff0000' : '#550000';
        ctx.fillText("OVERHEATED!", 240, 70);
    } else {
        if (heatRatio > 0.8) ctx.fillStyle = '#ff4757';
        else if (heatRatio > 0.5) ctx.fillStyle = '#ffa502';
        else ctx.fillStyle = '#2ed573';
    }
    ctx.fillRect(82, 57, 146 * heatRatio, 11);

    // Game Over Screen
    if (gameState === 'GAMEOVER') {
        ctx.fillStyle = 'rgba(10, 10, 22, 0.85)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = '#ff4757';
        ctx.font = '50px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText("GAME OVER", canvas.width/2, canvas.height/2 - 20);
        
        ctx.fillStyle = '#fff';
        ctx.font = '20px "Courier New"';
        ctx.fillText(`FINAL SCORE: ${score}`, canvas.width/2, canvas.height/2 + 30);
        ctx.fillStyle = '#00ffcc';
        ctx.fillText("PRESS JOYSTICK BUTTON TO RESTART", canvas.width/2, canvas.height/2 + 80);
    }
}

// Unified frame runner
function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
